<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NewAgent Landing Page</title>
    <style>
        :root {
            --primary-color: #4f46e5;
            --bg-color: #f9fafb;
            --text-color: #1f2937;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            margin: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            padding: 20px;
        }

        .hero {
            max-width: 800px;
        }

        h1 {
            font-size: 3.5rem;
            font-weight: 800;
            margin-bottom: 1.5rem;
            color: var(--primary-color);
        }

        p {
            font-size: 1.25rem;
            line-height: 1.6;
            margin-bottom: 2rem;
            color: #4b5563;
        }

        .btn {
            background-color: var(--primary-color);
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            transition: opacity 0.2s;
        }

        .btn:hover {
            opacity: 0.9;
        }

        /* Dialogflow Messenger custom styling */
        df-messenger {
            --df-messenger-button-titlebar-color: var(--primary-color);
            --df-messenger-chat-background-color: #fafafa;
            --df-messenger-font-color: #333;
            --df-messenger-send-icon: #4f46e5;
            --df-messenger-user-message-background-color: #4f46e5;
            --df-messenger-user-message-font-color: #fff;
        }
    </style>
</head>
<body>
    <div class="hero">
        <h1>Welcome to NewAgent!</h1>
        <p>I'm your intelligent virtual assistant, here to help you with everything you need. Try asking me a question using the chat widget in the bottom right corner.</p>
        <a href="#" class="btn">Learn More</a>
    </div>

    <!-- Dialogflow Messenger Code -->
    <script src="https://www.gstatic.com/dialogflow-console/fast/messenger/bootstrap.js?v=1"></script>
    <df-messenger
        intent="WELCOME"
        chat-title="NewAgent"
        agent-id="f491be98-bf51-4b2e-890e-5e9918fa1f38"
        language-code="en"
    ></df-messenger>
</body>
</html>
